<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pre-diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>
            <p class="text-blue-100 text-sm">
                Assistant pré-diagnostique médical
            </p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div id="form-section" class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    Symptômes du patient
                </h2>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                    <input type="number" id="age" 
                           class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                           placeholder="Ex : 28" min="0" max="120">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
                    <select id="sexe" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="F">Féminin</option>
                        <option value="M">Masculin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Température (°C)</label>
                    <input type="number" id="temperature" step="0.1" 
                           class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                           placeholder="Ex : 38.5" min="35" max="42">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tension systolique</label>
                    <input type="number" id="tension_sys" 
                           class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" 
                           placeholder="Ex : 120" min="60" max="250">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Symptômes</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="toux" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Toux</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="fatigue" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Fatigue</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="maux_tete" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Maux de tête</span>
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Région</label>
                    <select id="region" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="Dakar">Dakar</option>
                        <option value="Thies">Thiès</option>
                        <option value="Saint-Louis">Saint-Louis</option>
                        <option value="Ziguinchor">Ziguinchor</option>
                        <option value="Tambacounda">Tambacounda</option>
                        <option value="Kaolack">Kaolack</option>
                        <option value="Diourbel">Diourbel</option>
                        <option value="Fatick">Fatick</option>
                        <option value="Kolda">Kolda</option>
                        <option value="Matam">Matam</option>
                    </select>
                </div>

                <button onclick="diagnostiquer()" id="btn-diag" 
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md">
                    Diagnostiquer
                </button>
            </div>

            <div id="result-section">
                <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
                    <p class="text-4xl mb-3">&#129658;</p>
                    <p class="font-medium text-gray-600">Remplissez le formulaire</p>
                    <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-lg font-bold text-gray-700 mb-4 border-b pb-2">Derniers diagnostics</h3>
            <div id="historique-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                </div>
        </div>
    </main>

    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.3 - ESP / UCAD - L2 GLSI 2026
    </footer>

    <script>
        const API_URL = "http://localhost:8000";

        async function diagnostiquer() {
            const btn = document.getElementById("btn-diag");
            
            const patient = {
                age: parseInt(document.getElementById("age").value) || 0,
                sexe: document.getElementById("sexe").value,
                temperature: parseFloat(document.getElementById("temperature").value) || 0,
                tension_sys: parseInt(document.getElementById("tension_sys").value) || 0,
                toux: document.getElementById("toux").checked,
                fatigue: document.getElementById("fatigue").checked,
                maux_tete: document.getElementById("maux_tete").checked,
                region: document.getElementById("region").value
            };

            if (patient.age <= 0 || patient.temperature < 35 || patient.tension_sys < 60) {
                afficherErreur("Veuillez saisir des valeurs valides (Température min 35, Tension min 60).");
                return;
            }

            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");
            
            afficherChargement();

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(patient)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail ? "Erreur 422 : Format invalide" : "Erreur serveur");
                }

                const resultat = await response.json();
                afficherResultat(resultat);
                sauvegarderDansHistorique(resultat);

            } catch (error) {
                console.error(error);
                afficherErreur(error.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        function afficherChargement() {
            const section = document.getElementById("result-section");
            section.innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                    <p class="text-gray-500">Analyse médicale en cours...</p>
                </div>`;
        }

        function afficherResultat(r) {
            const couleurs = {
                "paludisme": { bg: "bg-red-50", text: "text-red-700", bar: "bg-red-500", badge: "bg-red-600" },
                "grippe": { bg: "bg-orange-50", text: "text-orange-700", bar: "bg-orange-500", badge: "bg-orange-600" },
                "typhoide": { bg: "bg-yellow-50", text: "text-yellow-700", bar: "bg-yellow-500", badge: "bg-yellow-600" },
                "sain": { bg: "bg-green-50", text: "text-green-700", bar: "bg-green-500", badge: "bg-green-600" }
            };

            const diagKey = r.diagnostic.toLowerCase();
            const c = couleurs[diagKey] || couleurs["sain"];
            const pct = Math.round(r.probabilite * 100);
            const section = document.getElementById("result-section");

            section.innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Résultat</h2>
                    <div class="${c.bg} rounded-lg p-4 mb-4">
                        <p class="text-sm text-gray-600">Diagnostic :</p>
                        <p class="text-2xl font-bold ${c.text} uppercase mt-1">${r.diagnostic}</p>
                    </div>
                    <div class="mb-4">
                        <div class="flex justify-between mb-1">
                            <span class="text-sm text-gray-600">Probabilité</span>
                            <span class="text-sm font-bold ${c.text}">${pct}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div id="progress-bar" class="${c.bar} h-3 rounded-full transition-all duration-1000 ease-out" 
                                 style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mb-3">
                        <span class="${c.badge} text-white text-xs px-2 py-1 rounded-full">${r.confiance}</span>
                        <span class="text-sm text-gray-600">confiance</span>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <p class="text-sm text-gray-700">${r.message}</p>
                    </div>
                </div>`;

            setTimeout(() => {
                if(document.getElementById("progress-bar")) {
                    document.getElementById("progress-bar").style.width = pct + "%";
                }
            }, 100);

            // NOUVEAU : Appel automatique de l'explication LLM
            demanderExplication(r);
        }

        async function demanderExplication(diagnostic_data) {
            const explainData = {
                diagnostic: diagnostic_data.diagnostic,
                probabilite: diagnostic_data.probabilite,
                age: parseInt(document.getElementById("age").value),
                sexe: document.getElementById("sexe").value,
                temperature: parseFloat(document.getElementById("temperature").value),
                region: document.getElementById("region").value
            };

            const section = document.getElementById("result-section");
            const explDiv = document.createElement("div");
            explDiv.id = "explication-zone";
            explDiv.innerHTML = `
                <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                    <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                    <p class="text-gray-500 text-sm animate-pulse">Generation en cours...</p>
                </div>`;
            
            section.querySelector(".bg-white").appendChild(explDiv);

            try {
                const response = await fetch(API_URL + "/explain", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(explainData)
                });

                if (response.ok) {
                    const result = await response.json();
                    explDiv.innerHTML = `
                        <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                            <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                            <p class="text-gray-700 text-sm leading-relaxed">${result.explication}</p>
                        </div>`;
                }
            } catch (error) {
                explDiv.innerHTML = `
                    <div class="mt-4 bg-gray-50 rounded-lg p-3">
                        <p class="text-gray-400 text-sm">Explication non disponible.</p>
                    </div>`;
            }
        }

        function afficherErreur(msg) {
            const section = document.getElementById("result-section");
            section.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-xl p-6">
                    <p class="text-red-700 font-medium">${msg}</p>
                    <p class="text-red-500 text-sm mt-2">Vérifiez vos paramètres et l'API.</p>
                </div>`;
        }

        function sauvegarderDansHistorique(resultat) {
            let historique = JSON.parse(localStorage.getItem("sensante_hist") || "[]");
            const nouveau = {
                diagnostic: resultat.diagnostic,
                probabilite: resultat.probabilite,
                heure: new Date().toLocaleTimeString()
            };
            historique.unshift(nouveau);
            historique = historique.slice(0, 3);
            localStorage.setItem("sensante_hist", JSON.stringify(historique));
            afficherHistorique();
        }

        function afficherHistorique() {
            const list = document.getElementById("historique-list");
            const historique = JSON.parse(localStorage.getItem("sensante_hist") || "[]");
            
            if (historique.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-sm italic">Aucun diagnostic récent.</p>';
                return;
            }

            list.innerHTML = historique.map(h => `
                <div class="bg-white p-3 rounded-lg shadow-sm border-l-4 border-blue-500">
                    <p class="font-bold uppercase text-blue-800 text-xs">${h.diagnostic}</p>
                    <p class="text-gray-600 text-xs">Probabilité : ${Math.round(h.probabilite*100)}%</p>
                    <p class="text-gray-400 text-[10px] mt-1">${h.heure}</p>
                </div>
            `).join('');
        }

        window.onload = afficherHistorique;
    </script>
</body>
</html>
